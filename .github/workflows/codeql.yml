name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

# Requires GitHub code scanning (free on public repos; needs Advanced Security on private ones).
permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # No compilation needed — analyse the sources directly (avoids JDK 25 / Gradle build setup).
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v3
