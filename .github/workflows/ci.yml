name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

# Cancel a superseded run on the same ref (e.g. a quick second push) to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon
