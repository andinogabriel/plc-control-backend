services:
  mongodb:
    image: mongo:7
    container_name: control-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      # Seed scripts run only on first init (empty data volume). Reset with: docker compose down -v
      - ./docker/mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: controlsystem
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: control-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/controlsystem
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1
    container_name: control-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
