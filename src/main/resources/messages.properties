# Default (Spanish) message bundle for all client-facing text.
# Loaded by Spring's MessageSource; UTF-8 (see spring.messages.encoding).
# Used for: Bean Validation messages, business errors and exception responses.
#
# Bean Validation interpolation note: each constraint only exposes its own attributes,
# e.g. @DecimalMin/@DecimalMax expose {value}, @Size exposes {min}/{max}. Range bounds are
# shared across the min/max fields because they enforce the same physical limits.

# --- Config: required fields ---
config.createdByName.required=El nombre es obligatorio
config.createdByName.size=El nombre no puede superar los {max} caracteres
config.createdByEmail.required=El email es obligatorio
config.createdByEmail.invalid=El email no tiene un formato valido
config.createdByEmail.size=El email no puede superar los {max} caracteres
config.temperatureMin.required=La temperatura minima es obligatoria
config.temperatureMax.required=La temperatura maxima es obligatoria
config.humidityMin.required=La humedad minima es obligatoria
config.humidityMax.required=La humedad maxima es obligatoria
config.hysteresisTemperature.required=La histeresis de temperatura es obligatoria
config.hysteresisHumidity.required=La histeresis de humedad es obligatoria
config.measurementInterval.required=El intervalo de medicion es obligatorio
config.measurementInterval.range=El intervalo de medicion debe estar entre 5 y 3600 segundos
config.deviceFingerprint.size=La huella del dispositivo no puede superar los {max} caracteres

# --- Config: shared range bounds (constraint attribute is {value}) ---
config.temperature.min=La temperatura no puede ser menor a {value} grados Celsius
config.temperature.max=La temperatura no puede ser mayor a {value} grados Celsius
config.humidity.min=La humedad no puede ser menor a {value} por ciento
config.humidity.max=La humedad no puede ser mayor a {value} por ciento
config.hysteresis.positive=La histeresis debe ser un valor positivo
config.hysteresis.max=La histeresis no puede superar {value}

# --- Config: business rules / lookup ---
config.temperature.ordering=La temperatura minima debe ser estrictamente menor que la maxima
config.humidity.ordering=La humedad minima debe ser estrictamente menor que la maxima
config.notFound=No se encontro una configuracion activa

# --- Measurement: validation ---
measurement.temperature.required=La temperatura es obligatoria
measurement.temperature.min=La temperatura no puede ser menor a {value} grados Celsius
measurement.temperature.max=La temperatura no puede ser mayor a {value} grados Celsius
measurement.humidity.required=La humedad es obligatoria
measurement.humidity.min=La humedad no puede ser menor a {value} por ciento
measurement.humidity.max=La humedad no puede ser mayor a {value} por ciento
measurement.coolerOn.required=El estado del cooler es obligatorio
measurement.relayOn.required=El estado del relay es obligatorio

# --- Measurement: lookup ---
measurement.notFound=No se encontraron mediciones

# --- Generic / infrastructure errors ---
error.validation=Uno o mas campos son invalidos
error.typeMismatch=Valor invalido para el parametro ''{0}''
error.internal=Ocurrio un error inesperado
error.request.tooLarge=El cuerpo de la solicitud supera el tamano maximo permitido de {0} bytes
error.rateLimit.exceeded=Demasiadas solicitudes. Intenta nuevamente en unos instantes
error.rateLimit.blacklisted=Tu IP fue bloqueada temporalmente por exceso de solicitudes

# --- HTTP status reason phrases (Spanish) ---
status.badRequest=Solicitud Incorrecta
status.notFound=No Encontrado
status.tooManyRequests=Demasiadas Solicitudes
status.payloadTooLarge=Carga Demasiado Grande
status.internalServerError=Error Interno del Servidor
