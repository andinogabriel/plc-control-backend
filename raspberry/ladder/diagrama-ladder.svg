<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="900" viewBox="0 0 1120 900" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1120" height="900" fill="#ffffff"/>

  <text x="30" y="34" font-size="18" font-weight="bold" fill="#111">Programa Ladder — Control on-off con histéresis + anti-ciclado + fail-safe</text>
  <text x="30" y="54" font-size="11" fill="#444">OpenPLC · lenguaje LD (5 rungs) · compila a control_histeresis_ladder.st · equivalente a control_histeresis.st (mismas direcciones Modbus)</text>

  <!-- rieles -->
  <line x1="60"  y1="80" x2="60"  y2="840" stroke="#111" stroke-width="3"/>
  <line x1="1080" y1="80" x2="1080" y2="840" stroke="#111" stroke-width="3"/>

  <!-- ===== RUNG 1: TimerOn ===== -->
  <text x="34" y="150" font-size="13" fill="#1565c0" font-weight="bold">1</text>
  <text x="80" y="108" font-size="11" fill="#2e7d32">Mide cuánto lleva el cooler ENCENDIDO (para exigir mínimo apagado antes de reencender)</text>
  <line x1="60" y1="155" x2="150" y2="155" stroke="#111" stroke-width="2"/>
  <!-- contacto NO Cooler -->
  <line x1="150" y1="140" x2="150" y2="170" stroke="#111" stroke-width="2"/>
  <line x1="170" y1="140" x2="170" y2="170" stroke="#111" stroke-width="2"/>
  <text x="160" y="134" text-anchor="middle" font-size="12" fill="#111">Cooler</text>
  <line x1="170" y1="155" x2="360" y2="155" stroke="#111" stroke-width="2"/>
  <!-- TON -->
  <rect x="360" y="122" width="150" height="66" fill="#eef4fc" stroke="#1565c0" stroke-width="1.6"/>
  <text x="435" y="116" text-anchor="middle" font-size="12" fill="#0d47a1" font-weight="bold">TimerOn</text>
  <text x="435" y="152" text-anchor="middle" font-size="14" fill="#0d47a1" font-weight="bold">TON</text>
  <text x="368" y="143" font-size="10" fill="#333">IN</text>
  <text x="502" y="143" font-size="10" fill="#333" text-anchor="end">Q</text>
  <text x="368" y="184" font-size="10" fill="#333">PT</text>
  <text x="502" y="184" font-size="10" fill="#333" text-anchor="end">ET</text>
  <text x="300" y="182" font-size="12" fill="#111">T#15s</text>
  <line x1="345" y1="178" x2="360" y2="178" stroke="#111" stroke-width="2"/>
  <line x1="510" y1="140" x2="1080" y2="140" stroke="#111" stroke-width="2"/>

  <!-- ===== RUNG 2: TimerOff ===== -->
  <text x="34" y="290" font-size="13" fill="#1565c0" font-weight="bold">2</text>
  <text x="80" y="248" font-size="11" fill="#2e7d32">Mide cuánto lleva el cooler APAGADO (contacto NC = NOT Cooler); exige mínimo encendido antes de encender</text>
  <line x1="60" y1="295" x2="150" y2="295" stroke="#111" stroke-width="2"/>
  <!-- contacto NC Cooler -->
  <line x1="150" y1="280" x2="150" y2="310" stroke="#111" stroke-width="2"/>
  <line x1="170" y1="280" x2="170" y2="310" stroke="#111" stroke-width="2"/>
  <line x1="150" y1="310" x2="170" y2="280" stroke="#111" stroke-width="2"/>
  <text x="160" y="274" text-anchor="middle" font-size="12" fill="#111">Cooler</text>
  <line x1="170" y1="295" x2="360" y2="295" stroke="#111" stroke-width="2"/>
  <rect x="360" y="262" width="150" height="66" fill="#eef4fc" stroke="#1565c0" stroke-width="1.6"/>
  <text x="435" y="256" text-anchor="middle" font-size="12" fill="#0d47a1" font-weight="bold">TimerOff</text>
  <text x="435" y="292" text-anchor="middle" font-size="14" fill="#0d47a1" font-weight="bold">TON</text>
  <text x="368" y="283" font-size="10" fill="#333">IN</text>
  <text x="502" y="283" font-size="10" fill="#333" text-anchor="end">Q</text>
  <text x="368" y="324" font-size="10" fill="#333">PT</text>
  <text x="502" y="324" font-size="10" fill="#333" text-anchor="end">ET</text>
  <text x="300" y="322" font-size="12" fill="#111">T#15s</text>
  <line x1="345" y1="318" x2="360" y2="318" stroke="#111" stroke-width="2"/>
  <line x1="510" y1="280" x2="1080" y2="280" stroke="#111" stroke-width="2"/>

  <!-- ===== RUNG 3: SET ===== -->
  <text x="34" y="440" font-size="13" fill="#1565c0" font-weight="bold">3</text>
  <text x="80" y="398" font-size="11" fill="#2e7d32">ENCENDER: si Temp ≥ umbral superior  Y  ya cumplió el mínimo apagado (TimerOff.Q)</text>
  <line x1="60" y1="445" x2="150" y2="445" stroke="#111" stroke-width="2"/>
  <!-- GE -->
  <rect x="150" y="415" width="150" height="62" fill="#eef4fc" stroke="#1565c0" stroke-width="1.6"/>
  <text x="225" y="453" text-anchor="middle" font-size="15" fill="#0d47a1" font-weight="bold">GE</text>
  <text x="158" y="434" font-size="10" fill="#333">IN1</text>
  <text x="292" y="434" font-size="10" fill="#333" text-anchor="end">OUT</text>
  <text x="158" y="468" font-size="10" fill="#333">IN2</text>
  <text x="112" y="430" text-anchor="end" font-size="11" fill="#444">Temp</text>
  <text x="112" y="468" text-anchor="end" font-size="11" fill="#444">TempMax</text>
  <line x1="115" y1="426" x2="150" y2="426" stroke="#111" stroke-width="2"/>
  <line x1="115" y1="460" x2="150" y2="460" stroke="#111" stroke-width="2"/>
  <line x1="300" y1="445" x2="700" y2="445" stroke="#111" stroke-width="2"/>
  <!-- contacto NO TimerOff.Q -->
  <line x1="700" y1="430" x2="700" y2="460" stroke="#111" stroke-width="2"/>
  <line x1="720" y1="430" x2="720" y2="460" stroke="#111" stroke-width="2"/>
  <text x="710" y="424" text-anchor="middle" font-size="12" fill="#111">TimerOff.Q</text>
  <line x1="720" y1="445" x2="948" y2="445" stroke="#111" stroke-width="2"/>
  <!-- bobina SET -->
  <path d="M 950 430 A 15 15 0 0 0 950 460" fill="none" stroke="#111" stroke-width="2"/>
  <path d="M 980 430 A 15 15 0 0 1 980 460" fill="none" stroke="#111" stroke-width="2"/>
  <text x="965" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">S</text>
  <text x="965" y="422" text-anchor="middle" font-size="12" fill="#111">Cooler</text>
  <line x1="980" y1="445" x2="1080" y2="445" stroke="#111" stroke-width="2"/>

  <!-- ===== RUNG 4: RESET ===== -->
  <text x="34" y="580" font-size="13" fill="#1565c0" font-weight="bold">4</text>
  <text x="80" y="538" font-size="11" fill="#2e7d32">APAGAR: si Temp ≤ umbral inferior  Y  ya cumplió el mínimo encendido (TimerOn.Q)</text>
  <line x1="60" y1="585" x2="150" y2="585" stroke="#111" stroke-width="2"/>
  <rect x="150" y="555" width="150" height="62" fill="#eef4fc" stroke="#1565c0" stroke-width="1.6"/>
  <text x="225" y="593" text-anchor="middle" font-size="15" fill="#0d47a1" font-weight="bold">LE</text>
  <text x="158" y="574" font-size="10" fill="#333">IN1</text>
  <text x="292" y="574" font-size="10" fill="#333" text-anchor="end">OUT</text>
  <text x="158" y="608" font-size="10" fill="#333">IN2</text>
  <text x="112" y="570" text-anchor="end" font-size="11" fill="#444">Temp</text>
  <text x="112" y="608" text-anchor="end" font-size="11" fill="#444">TempMin</text>
  <line x1="115" y1="566" x2="150" y2="566" stroke="#111" stroke-width="2"/>
  <line x1="115" y1="600" x2="150" y2="600" stroke="#111" stroke-width="2"/>
  <line x1="300" y1="585" x2="700" y2="585" stroke="#111" stroke-width="2"/>
  <line x1="700" y1="570" x2="700" y2="600" stroke="#111" stroke-width="2"/>
  <line x1="720" y1="570" x2="720" y2="600" stroke="#111" stroke-width="2"/>
  <text x="710" y="564" text-anchor="middle" font-size="12" fill="#111">TimerOn.Q</text>
  <line x1="720" y1="585" x2="948" y2="585" stroke="#111" stroke-width="2"/>
  <path d="M 950 570 A 15 15 0 0 0 950 600" fill="none" stroke="#111" stroke-width="2"/>
  <path d="M 980 570 A 15 15 0 0 1 980 600" fill="none" stroke="#111" stroke-width="2"/>
  <text x="965" y="590" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">R</text>
  <text x="965" y="562" text-anchor="middle" font-size="12" fill="#111">Cooler</text>
  <line x1="980" y1="585" x2="1080" y2="585" stroke="#111" stroke-width="2"/>

  <!-- ===== RUNG 5: FAIL-SAFE ===== -->
  <text x="34" y="720" font-size="13" fill="#1565c0" font-weight="bold">5</text>
  <text x="80" y="678" font-size="11" fill="#2e7d32">FAIL-SAFE: si TempMax ≤ TempMin (config inválida / sin escribir) → apagar el cooler</text>
  <line x1="60" y1="725" x2="150" y2="725" stroke="#111" stroke-width="2"/>
  <rect x="150" y="695" width="150" height="62" fill="#fdecea" stroke="#c62828" stroke-width="1.6"/>
  <text x="225" y="733" text-anchor="middle" font-size="15" fill="#b71c1c" font-weight="bold">LE</text>
  <text x="158" y="714" font-size="10" fill="#333">IN1</text>
  <text x="292" y="714" font-size="10" fill="#333" text-anchor="end">OUT</text>
  <text x="158" y="748" font-size="10" fill="#333">IN2</text>
  <text x="112" y="710" text-anchor="end" font-size="11" fill="#444">TempMax</text>
  <text x="112" y="748" text-anchor="end" font-size="11" fill="#444">TempMin</text>
  <line x1="115" y1="706" x2="150" y2="706" stroke="#111" stroke-width="2"/>
  <line x1="115" y1="740" x2="150" y2="740" stroke="#111" stroke-width="2"/>
  <line x1="300" y1="725" x2="948" y2="725" stroke="#111" stroke-width="2"/>
  <path d="M 950 710 A 15 15 0 0 0 950 740" fill="none" stroke="#111" stroke-width="2"/>
  <path d="M 980 710 A 15 15 0 0 1 980 740" fill="none" stroke="#111" stroke-width="2"/>
  <text x="965" y="730" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">R</text>
  <text x="965" y="702" text-anchor="middle" font-size="12" fill="#111">Cooler</text>
  <line x1="980" y1="725" x2="1080" y2="725" stroke="#111" stroke-width="2"/>

  <!-- nota -->
  <rect x="60" y="775" width="1020" height="95" rx="8" fill="#fafafa" stroke="#bdbdbd"/>
  <text x="80" y="800" font-size="13" font-weight="bold" fill="#111">Histéresis (banda muerta):</text>
  <text x="80" y="822" font-size="11" fill="#444">El rung 3 hace SET al llegar a TempMax; el rung 4 hace RESET al bajar a TempMin. Entre ambos, ningún rung actúa → el latch Set/Reset conserva el estado. Esa memoria ES la banda muerta.</text>
  <text x="80" y="842" font-size="11" fill="#444">Los timers TON (rungs 1-2) agregan el anti-ciclado: sólo permiten conmutar tras 15 s en el estado contrario. Umbrales: TempMax = temperatureMax · TempMin = temperatureMax − hysteresisTemperature.</text>
  <text x="80" y="862" font-size="11" fill="#111" font-weight="bold">Orden de scan: SET (rung 3) → RESET (rungs 4-5). Si ambos aplican, RESET gana → el fail-safe domina.</text>
</svg>
